      type: object
      properties:
        value: { type: string }
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
    VaultStatusResponse:
      type: object
      properties:
        status: { type: string, enum: [missing, locked, unlocked] }
